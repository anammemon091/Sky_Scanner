name: sky_scanner
description: "A professional weather application for HNG Stage 3"
publish_to: 'none'

# This is the line your error is asking for
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Essential packages for our weather app
  http: ^1.2.1
  provider: ^6.1.2
  geolocator: ^13.0.1
  intl: ^0.19.0
  lottie: ^3.1.2 # <--- Add this
  shared_preferences: ^2.2.2 
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - assets/animations/ 
    - assets/logo.png
    #- .env 

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/logo.png"
  
  